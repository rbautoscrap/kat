[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "node scripts/start-prod.mjs"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

# Persistence (REQUIRED — create in Railway UI if missing):
#   Volume mount path = /app/data
#   Recommended size ≈ 250GB (DB + uploads + backup ZIPs)
# Stores SQLite DB + listing photos + backups across redeploys.
# Railway sets RAILWAY_VOLUME_MOUNT_PATH / RAILWAY_PUBLIC_DOMAIN automatically.
#
# Large ZIP restore uploads go to RAILWAY_PUBLIC_DOMAIN (not Cloudflare).
# Optional overrides:
#   RAILWAY_RESTORE_ORIGIN=https://your-service.up.railway.app
#   BACKUP_MAX_COUNT=25
